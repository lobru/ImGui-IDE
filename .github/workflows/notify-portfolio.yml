# .github/workflows/notify-portfolio.yml — paste into lobotomy-x/ImGuiColorTextEdit
name: Notify portfolio
on:
  push:
    branches: ["lobotomy/main"]
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to portfolio repo
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/lobru/portfolio/dispatches \
            -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}","sha":"${{ github.sha }}"}}'
