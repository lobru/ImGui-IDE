name: Windows

on: [push]

jobs:
  verify-windows:
    runs-on: windows-2025

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Configure
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -S .

    - name: Build
      run: cmake --build build --config Release
