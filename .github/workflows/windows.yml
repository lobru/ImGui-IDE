name: Windows

on: [push]

jobs:
  verify-windows:
    runs-on: windows-2025

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -S example

    - name: Build
      run: cmake --build build --config Release

  # embed DLL + headless gates, in both ImGui modes (full / public-API-only)
  verify-embed-windows:
    runs-on: windows-2025

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure (default)
      run: cmake -B build-embed -G "Visual Studio 17 2022" -A x64 -S embed

    - name: Build (default)
      run: cmake --build build-embed --config Release

    - name: Test (default)
      run: ctest --test-dir build-embed -C Release --output-on-failure

    - name: Configure (public-ImGui-API-only)
      run: cmake -B build-embed-shim -G "Visual Studio 17 2022" -A x64 -DTE_EMBED_NO_IMGUI_INTERNAL=ON -S embed

    - name: Build (public-ImGui-API-only)
      run: cmake --build build-embed-shim --config Release

    - name: Test (public-ImGui-API-only)
      run: ctest --test-dir build-embed-shim -C Release --output-on-failure
